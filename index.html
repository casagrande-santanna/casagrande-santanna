<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Grande de Sant'Anna</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  font-family:Arial,sans-serif;
  max-width:700px;
  margin:0 auto;
  padding:20px;
  background:#f5f5f5;
}

.card{
  background:#fff;
  border-radius:10px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#27500A;
  color:#fff;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:.6;
}

.reserva{
  border-left:5px solid #27500A;
  padding:10px;
  background:#fafafa;
  margin-top:10px;
}

.erro{
  background:#ffe5e5;
  color:#a10000;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

.ok{
  background:#e7f8e7;
  color:#0b640b;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>Casa Grande de Sant'Anna</h2>
<p>Sistema de reservas da quadra</p>
</div>

<div class="card">
<h3>Nova reserva</h3>

<label>Data</label>
<input type="date" id="data">

</html>
