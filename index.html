<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Grande de Sant'Anna</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:Arial,sans-serif;background:#f0f0f0;padding:20px;max-width:500px;margin:0 auto;}
  .login-container{background:#27500A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{background:#fff;border-radius:12px;padding:30px;width:100%;max-width:350px;}
  .login-card h1{font-size:20px;margin-bottom:5px;color:#27500A;}
  .login-card p{font-size:12px;color:#666;margin-bottom:20px;}
  input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;}
  button{width:100%;padding:12px;background:#27500A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;}
  button:hover{background:#1a3a05;}
  .error{background:#ffebeb;color:#c62828;padding:10px;border-radius:8px;margin-top:10px;font-size:12px;display:none;}
  .link{text-align:center;margin-top:12px;font-size:12px;color:#666;}
  .link span{color:#27500A;cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>

<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h1>🏠 Casa Grande de Sant'Anna</h1>
    <p>Sistema de reserva da quadra</p>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
    <button id="btnLogin">Entrar</button>
    <div id="errorMsg" class="error"></div>
    <div class="link">
      <span id="linkCadastro">Não tem conta? Cadastre-se</span>
    </div>
  </div>
</div>

<div id="appScreen" style="display:none;padding:20px;">
  <h2>Bem-vindo!</h2>
  <p id="userInfo">Carregando...</p>
  <button id="btnLogout" style="background:#c62828;margin-top:20px;">Sair</button>
</div>

<script>
// CONFIGURAÇÃO DO SUPABASE
const SUPABASE_URL = 'https://gkdwfntluopycapxyvfx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrZHdmbnRsdW9weWNhcHh5dmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTQxMTYsImV4cCI6MjA5Mzg3MDExNn0.WkrshkvWATT2wyAbPiIRzBaIFIwe9YqKt4er-_AcjKI';

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ELEMENTOS
const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');
const btnLogin = document.getElementById('btnLogin');
const btnLogout = document.getElementById('btnLogout');
const errorMsg = document.getElementById('errorMsg');
const userInfo = document.getElementById('userInfo');
const linkCadastro = document.getElementById('linkCadastro');

// FUNÇÃO PARA MOSTRAR ERRO
function showError(message) {
  errorMsg.textContent = message;
  errorMsg.style.display = 'block';
  setTimeout(() => {
    errorMsg.style.display = 'none';
  }, 5000);
}

// FUNÇÃO PARA CARREGAR DADOS DO MORADOR
async function carregarMorador(userId) {
  try {
    const { data, error } = await supabase
      .from('moradores')
      .select('*, unidades(*)')
      .eq('auth_user_id', userId)
      .single();
    
    if (error) throw error;
    
    if (data.status !== 'ativo') {
      throw new Error('Cadastro pendente ou inativo. Aguarde aprovação do administrador.');
    }
    
    const apto = data.unidades ? data.unidades.codigo : 'Administrador';
    userInfo.innerHTML = `
      <strong>${data.nome}</strong><br>
      ${apto}<br>
      Tipo: ${data.tipo === 'admin' ? 'Administrador' : 'Morador'}
    `;
    
    return true;
  } catch (error) {
    console.error('Erro ao carregar morador:', error);
    showError(error.message || 'Erro ao carregar dados do usuário');
    return false;
  }
}

// FUNÇÃO DE LOGIN
async function fazerLogin(email, senha) {
  try {
    // Tentar fazer login
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: senha
    });
    
    if (error) throw error;
    
    if (!data.user) throw new Error('Usuário não encontrado');
    
    // Carregar dados do morador
    const success = await carregarMorador(data.user.id);
    
    if (success) {
      // Mostrar app
      loginScreen.style.display = 'none';
      appScreen.style.display = 'block';
    }
    
  } catch (error) {
    console.error('Erro no login:', error);
    showError(error.message || 'E-mail ou senha incorretos');
  }
}

// FUNÇÃO DE LOGOUT
async function fazerLogout() {
  try {
    await supabase.auth.signOut();
    loginScreen.style.display = 'flex';
    appScreen.style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
  } catch (error) {
    console.error('Erro ao sair:', error);
  }
}

// FUNÇÃO DE CADASTRO SIMPLES
async function fazerCadastro() {
  const nome = prompt('Digite seu nome completo:');
  if (!nome) return;
  
  const email = prompt('Digite seu e-mail:');
  if (!email) return;
  
  const senha = prompt('Digite sua senha (mínimo 6 caracteres):');
  if (!senha || senha.length < 6) {
    alert('Senha deve ter no mínimo 6 caracteres');
    return;
  }
  
  const apto = prompt('Digite seu apartamento (ex: A-0101, B-1504):');
  if (!apto) return;
  
  try {
    // Criar usuário no Auth
    const { data: authData, error: authError } = await supabase.auth.signUp({
      email: email,
      password: senha
    });
    
    if (authError) throw authError;
    
    // Buscar unidade_id
    const { data: unidadeData, error: unidadeError } = await supabase
      .from('unidades')
      .select('id')
      .eq('codigo', apto.toUpperCase())
      .single();
    
    if (unidadeError || !unidadeData) {
      throw new Error('Apartamento não encontrado. Verifique o formato (ex: A-0101)');
    }
    
    // Criar registro do morador
    const { error: moradorError } = await supabase
      .from('moradores')
      .insert({
        auth_user_id: authData.user.id,
        unidade_id: unidadeData.id,
        nome: nome,
        email: email,
        tipo: 'proprietario',
        status: 'pendente',
        lgpd_aceito: true
      });
    
    if (moradorError) throw moradorError;
    
    alert('Cadastro realizado! Aguarde a aprovação do administrador.');
    
  } catch (error) {
    console.error('Erro no cadastro:', error);
    alert('Erro ao cadastrar: ' + error.message);
  }
}

// VERIFICAR SESSÃO EXISTENTE
async function verificarSessao() {
  try {
    const { data: { session }, error } = await supabase.auth.getSession();
    
    if (error) throw error;
    
    if (session && session.user) {
      const success = await carregarMorador(session.user.id);
      if (success) {
        loginScreen.style.display = 'none';
        appScreen.style.display = 'block';
      }
    }
  } catch (error) {
    console.error('Erro ao verificar sessão:', error);
  }
}

// EVENTOS
btnLogin.addEventListener('click', () => {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('password').value;
  
  if (!email || !senha) {
    showError('Preencha e-mail e senha');
    return;
  }
  
  fazerLogin(email, senha);
});

btnLogout.addEventListener('click', fazerLogout);

linkCadastro.addEventListener('click', fazerCadastro);

// Permitir login com Enter
document.getElementById('password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    btnLogin.click();
  }
});

// Inicializar
verificarSessao();

// ESCUTAR MUDANÇAS DE AUTENTICAÇÃO
supabase.auth.onAuthStateChange(async (event, session) => {
  console.log('Auth event:', event);
  if (event === 'SIGNED_OUT') {
    loginScreen.style.display = 'flex';
    appScreen.style.display = 'none';
  } else if (event === 'SIGNED_IN' && session) {
    const success = await carregarMorador(session.user.id);
    if (success) {
      loginScreen.style.display = 'none';
      appScreen.style.display = 'block';
    }
  }
});
</script>
</body>
</html>
