// ==================== SANITIZAÇÃO E VALIDAÇÃO ====================

function safeText(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

function validarTexto(texto, minimo = 1, maximo = 500) {
  if (!texto || texto.trim().length === 0) {
    throw new Error(`Campo obrigatório`);
  }
  if (texto.trim().length < minimo) {
    throw new Error(`Mínimo de ${minimo} caracteres`);
  }
  if (texto.length > maximo) {
    throw new Error(`Máximo de ${maximo} caracteres`);
  }
  if (/<[^>]*>/g.test(texto)) {
    throw new Error('HTML não permitido');
  }
  return DOMPurify.sanitize(texto.trim());
}

function validarEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!regex.test(email)) {
    throw new Error('Email inválido');
  }
  return email.trim();
}

function validarData(dataString) {
  const data = new Date(dataString);
  if (isNaN(data.getTime())) {
    throw new Error('Data inválida');
  }
  if (data < new Date().setHours(0, 0, 0, 0)) {
    throw new Error('Data não pode ser no passado');
  }
  return dataString;
}

async function renderAvisos(pagina = 0) {
  var container = document.getElementById('avisos-list');
  if (!container) return;

  const ITEMS_PER_PAGE = 20;
  const offset = pagina * ITEMS_PER_PAGE;

  try {
    var {data: avisos, count} = await sb
      .from('avisos')
      .select('*', {count: 'exact'})
      .eq('ativo', true)
      .order('created_at', {ascending: false})
      .range(offset, offset + ITEMS_PER_PAGE - 1);

    if (!avisos || avisos.length === 0) {
      container.innerHTML = '<div class="empty"><i class="ti ti-bell-off"></i>Nenhum aviso</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < avisos.length; i++) {
      var av = avisos[i];
      html += '<div class="card">';
      html += '<div class="card-title"><i class="ti ti-bell"></i>' + safeText(av.titulo) + '</div>';
      html += '<div style="font-size:12px;margin-bottom:8px">' + safeText(av.corpo) + '</div>';
      html += '<div style="font-size:10px;color:var(--t2)">' + fmtD(av.created_at?.slice(0, 10)) + '</div>';
      html += '</div>';
    }

    // Paginação
    if (pagina > 0) {
      html += '<button class="btn-s" onclick="renderAvisos(' + (pagina - 1) + ')" style="width:100%;margin-top:10px">← Anterior</button>';
    }
    if ((pagina + 1) * ITEMS_PER_PAGE < count) {
      html += '<button class="btn-s" onclick="renderAvisos(' + (pagina + 1) + ')" style="width:100%;margin-top:6px">Próximo →</button>';
    }

    container.innerHTML = html;
  } catch (err) {
    console.error('Erro ao renderizar avisos:', err);
    container.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i>Erro ao carregar avisos</div>';
  }
}

var html5QrcodeScanner = null;

function fecharScanner() {
  if (html5QrcodeScanner) {
    html5QrcodeScanner.stop().catch(function() {});
    html5QrcodeScanner = null;
  }
  var reader = document.getElementById('reader');
  var ba = document.getElementById('btn-abrir-scanner');
  var bf = document.getElementById('btn-fechar-scanner');
  if (reader) reader.style.display = 'none';
  if (ba) ba.style.display = 'inline-flex';
  if (bf) bf.style.display = 'none';
}

async function processarQrQuadra(code) {
  try {
    if (code !== 'CG_QUADRA_01') {
      toast('QR Code inválido para esta quadra', 'aviso');
      return;
    }

    // Buscar reserva do morador para hoje no horário atual
    var agora = new Date();
    var dataHoje = ts();
    var horaAtual = String(agora.getHours()).padStart(2, '0') + ':00';

    var {data: reservas} = await sb
      .from('reservas')
      .select('*')
      .eq('unidade_id', morador.unidade_id)
      .eq('data_reserva', dataHoje)
      .eq('status', 'confirmada')
      .gte('slot_inicio', horaAtual);

    if (!reservas || reservas.length === 0) {
      toast('Nenhuma reserva ativa no momento', 'aviso');
      return;
    }

    var reserva = reservas[0];

    // Registrar check-in
    var {error} = await sb.from('checkins').insert({
      reserva_id: reserva.id,
      morador_id: morador.id,
      metodo: 'qr_code',
      timestamp: new Date().toISOString()
    });

    if (error) {
      toast('Erro ao fazer check-in: ' + error.message, 'erro');
    } else {
      toast('✓ Check-in realizado com sucesso!', 'sucesso');
      fecharScanner();
      renderCheckin();
    }
  } catch (err) {
    console.error('Erro ao processar QR:', err);
    toast('Erro ao processar check-in', 'erro');
  }
}

async function renderCheckin() {
  var container = document.getElementById('ckin-main');
  if (!container) return;

  try {
    var {data: checkins} = await sb
      .from('checkins')
      .select('*, reservas(data_reserva, slot_inicio)')
      .eq('morador_id', morador.id)
      .order('timestamp', {ascending: false})
      .limit(20);

    var html = `
      <div class="card" style="background:var(--vl);border-color:#97C459;margin-bottom:10px">
        <div class="card-title"><i class="ti ti-qrcode" style="color:var(--vm)"></i>Escanear QR Code</div>
        <div style="font-size:11px;margin-bottom:10px">Aponte a câmera para o QR Code da quadra.</div>
        <div id="reader" style="width:100%;border-radius:8px;overflow:hidden;display:none;margin-bottom:10px"></div>
        <button class="btn-p" id="btn-abrir-scanner" style="background:var(--vm);width:100%"><i class="ti ti-camera"></i>Escanear</button>
        <button class="btn-s" id="btn-fechar-scanner" style="display:none;width:100%;margin-top:6px;border-color:var(--rdb);color:var(--rdt)"><i class="ti ti-x"></i>Cancelar</button>
      </div>
    `;

    if (checkins && checkins.length > 0) {
      html += '<div class="sec-lbl" style="padding:10px 0 5px">Histórico recente</div>';
      for (var i = 0; i < checkins.length; i++) {
        var c = checkins[i];
        var dataHora = new Date(c.timestamp).toLocaleString('pt-BR');
        html += '<div class="card">';
        html += '<div style="font-size:11px;font-weight:600">' + dataHora + '</div>';
        html += '<div style="font-size:10px;color:var(--t2)">Reserva: ' + fmtD(c.reservas?.data_reserva) + ' às ' + (c.reservas?.slot_inicio?.slice(0, 5) || '??:??') + '</div>';
        html += '</div>';
      }
    }

    container.innerHTML = html;

    // Registrar listeners
    document.getElementById('btn-abrir-scanner').onclick = function() {
      var reader = document.getElementById('reader');
      reader.style.display = 'block';
      this.style.display = 'none';
      document.getElementById('btn-fechar-scanner').style.display = 'inline-flex';

      html5QrcodeScanner = new Html5Qrcode('reader');
      html5QrcodeScanner.start(
        {facingMode: 'environment'},
        {fps: 10, qrbox: {width: 250, height: 250}},
        function(decoded) {
          processarQrQuadra(decoded);
          fecharScanner();
        },
        function(err) {}
      ).catch(function(err) {
        toast('Erro ao acessar câmera: ' + err.message, 'erro');
        fecharScanner();
      });
    };

    document.getElementById('btn-fechar-scanner').onclick = fecharScanner;

  } catch (err) {
    console.error('Erro ao renderizar check-in:', err);
    container.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i>Erro ao carregar</div>';
  }
}

// ==================== RENDER CALENDÁRIOS ====================

var currentYear = new Date().getFullYear();
var currentMonth = new Date().getMonth();

function renderCalendarioReservas() {
  var lbl = document.getElementById('cal-lbl');
  var grid = document.getElementById('cal-grid');
  if (!lbl || !grid) return;

  lbl.textContent = MESES[currentMonth] + ' ' + currentYear;

  var firstDay = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  var today = ts();

  var html = DIAS_N.map(function(d) { return '<div class="cal-dn">' + d + '</div>'; }).join('');

  for (var i = 0; i < firstDay; i++) html += '<div></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var ds = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var cls = 'cal-d';
    if (ds === today) cls += ' today';
    html += '<div class="' + cls + '">' + d + '</div>';
  }
  grid.innerHTML = html;
}

document.getElementById('btn-prev-m')?.addEventListener('click', function() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendarioReservas();
});

document.getElementById('btn-next-m')?.addEventListener('click', function() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendarioReservas();
});

      html += '<div class="card">';
      html += '<div class="card-title">Apto ' + apto + '</div>';
      html += '<div style="font-size:12px;margin-bottom:4px">' + safeText(p.modalidade || 'Esporte') + '</div>';
      html += '<div style="font-size:18px;font-weight:600">' + (p.placar_casa || 0) + ' × ' + (p.placar_visitante || 0) + '</div>';
      html += '</div>';
    }

    container.innerHTML = html;
  } catch (err) {
    console.error('Erro ao renderizar quadra:', err);
    container.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i>Erro ao carregar</div>';
  }
}

// ==================== RENDER OCORRÊNCIAS ====================

async function renderOcorrencias(status = 'aberta') {
  var container = document.getElementById('oco-list');
  if (!container) return;

  try {
    var query = sb.from('ocorrencias').select('*').order('created_at', {ascending: false});

    if (status !== 'todas') {
      query = query.eq('status', status);
    }

    var {data: ocorrencias} = await query.limit(50);

    if (!ocorrencias || ocorrencias.length === 0) {
      container.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i>Nenhuma ocorrência</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < ocorrencias.length; i++) {
      var o = ocorrencias[i];
      html += '<div class="card oco-card ' + safeText(o.status) + '">';
      html += '<div class="oco-top">';
      html += '<div class="oco-titulo">' + safeText(o.titulo) + '</div>';
      html += '<span class="badge b-gray">' + safeText(o.status) + '</span>';
      html += '</div>';
      html += '<div style="font-size:11px;color:var(--t2);margin:6px 0">' + safeText(o.descricao) + '</div>';
      html += '<div style="font-size:10px;color:var(--t2)">' + fmtD(o.created_at?.slice(0, 10)) + '</div>';
      html += '</div>';
    }

    container.innerHTML = html;
  } catch (err) {
    console.error('Erro ao renderizar ocorrências:', err);
    container.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i>Erro ao carregar</div>';
  }
}

document.getElementById('tab-ocorrencias')?.addEventListener('click', function() {
  var pills = document.querySelectorAll('.fpill');
  if (pills.length > 0) {
    pills[0].classList.add('active');
    renderOcorrencias('aberta');
  }
});

// ==================== RENDER CONFIGURAÇÕES (ADMIN) ====================

async function renderConfig() {
  var container = document.getElementById('screen-config');
  if (!container) return;

  if (!isAdmin()) {
    toast('Acesso restrito', 'aviso');
    return;
  }

  try {
    // Renderizar formulário com valores atuais
    var html = `
      <div class="card">
        <div class="card-title"><i class="ti ti-settings"></i>Limites de Reservas</div>
        <div class="form-row">
          <label class="form-lbl">Reservas máximas por mês</label>
          <select class="form-in" id="cfg-max-mes">
            <option value="1">1 reserva</option>
            <option value="2">2 reservas</option>
            <option value="3">3 reservas</option>
            <option value="4" selected>4 reservas</option>
            <option value="6">6 reservas</option>
            <option value="8">8 reservas</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-lbl">Reservas simultâneas abertas</label>
          <select class="form-in" id="cfg-max-simult">
            <option value="1">1 reserva por vez</option>
            <option value="2" selected>2 reservas por vez</option>
            <option value="3">3 reservas por vez</option>
            <option value="4">4 reservas por vez</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-lbl">Antecedência mínima (minutos)</label>
          <select class="form-in" id="cfg-ant-min">
            <option value="0">Sem restrição</option>
            <option value="30">30 minutos</option>
            <option value="60" selected>1 hora</option>
            <option value="120">2 horas</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-lbl">Antecedência máxima (dias)</label>
          <select class="form-in" id="cfg-ant-max">
            <option value="7">7 dias</option>
            <option value="15" selected>15 dias</option>
            <option value="30">30 dias</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-door-enter"></i>Check-in</div>
        <div class="form-row">
          <label class="form-lbl">Janela de check-in (minutos após início)</label>
          <select class="form-in" id="cfg-ckin-janela">
            <option value="10">10 minutos</option>
            <option value="15" selected>15 minutos</option>
            <option value="20">20 minutos</option>
            <option value="30">30 minutos</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-shield-x"></i>Fair Play</div>
        <div class="form-row">
          <label class="form-lbl">Faltas para suspensão automática</label>
          <select class="form-in" id="cfg-faltas-susp">
            <option value="1">1 falta</option>
            <option value="2" selected>2 faltas</option>
            <option value="3">3 faltas</option>
            <option value="5">5 faltas</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-lbl">Duração da suspensão (dias)</label>
          <select class="form-in" id="cfg-susp-dias">
            <option value="7">7 dias</option>
            <option value="15" selected>15 dias</option>
            <option value="30">30 dias</option>
            <option value="60">60 dias</option>
          </select>
        </div>
      </div>

      <button class="btn-p" id="btn-salvar-config" style="margin-bottom:8px"><i class="ti ti-device-floppy"></i>Salvar Configurações</button>
    `;

    // Encontrar elemento específico ou usar a tela
    var configSection = document.querySelector('[data-config-form]') || 
                       document.createElement('div');
    configSection.innerHTML = html;
    configSection.style.padding = '16px 16px 40px';

    if (!document.querySelector('[data-config-form]')) {
      container.appendChild(configSection);
    }

    // Handler de salvamento
    document.getElementById('btn-salvar-config').addEventListener('click', async function() {
      try {
        var maxMes = parseInt(document.getElementById('cfg-max-mes').value);
        var maxSimult = parseInt(document.getElementById('cfg-max-simult').value);
        var antMin = parseInt(document.getElementById('cfg-ant-min').value);
        var antMax = parseInt(document.getElementById('cfg-ant-max').value);
        var ckinJanela = parseInt(document.getElementById('cfg-ckin-janela').value);
        var faltasSusp = parseInt(document.getElementById('cfg-faltas-susp').value);
        var suspDias = parseInt(document.getElementById('cfg-susp-dias').value);

        // Atualizar cada configuração
        var updates = [
          {chave: 'max_reservas_mes', valor_inteiro: maxMes},
          {chave: 'max_reservas_simult', valor_inteiro: maxSimult},
          {chave: 'antecedencia_min', valor_inteiro: antMin},
          {chave: 'antecedencia_max', valor_inteiro: antMax},
          {chave: 'ckin_janela', valor_inteiro: ckinJanela},
          {chave: 'faltas_para_susp', valor_inteiro: faltasSusp},
          {chave: 'dias_suspensao', valor_inteiro: suspDias},
          {chave: 'atualizado_por', valor_texto: morador.id},
          {chave: 'atualizado_em', valor_texto: new Date().toISOString()}
        ];

        for (var i = 0; i < updates.length; i++) {
          await sb
            .from('configuracoes')
            .update({
              valor_inteiro: updates[i].valor_inteiro,
              atualizado_por: morador.id,
              atualizado_em: new Date().toISOString()
            })
            .eq('chave', updates[i].chave);
        }

        // Recarregar configurações globais
        await carregarConfiguracoes();

        // Registrar auditoria
        await registrarAuditoria('editar_config', 'configuracoes', null, {
          max_reservas: maxMes,
          fair_play: faltasSusp
        }, 'Configurações atualizadas');

        toast('Configurações salvas com sucesso', 'sucesso');

      } catch (err) {
        console.error('Erro ao salvar configurações:', err);
        toast('Erro ao salvar: ' + err.message, 'erro');
      }
    });

  } catch (err) {
    console.error('Erro ao renderizar configurações:', err);
    toast('Erro ao carregar configurações', 'erro');
  }
}
