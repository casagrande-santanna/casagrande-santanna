<style>
/* SEU CSS ORIGINAL - MANTIDO INTEGRALMENTE */
:root{
  --v:#27500A;--vl:#EAF3DE;--vm:#3B6D11;
  --am:#FAEEDA;--amb:#EF9F27;--amt:#854F0B;
  --rd:#FCEBEB;--rdb:#F09595;--rdt:#A32D2D;
  --bl:#E6F1FB;--blb:#85B7EB;--blt:#185FA5;
  --gy:#F1EFE8;--gyb:#B4B2A9;--gyt:#5F5E5A;
  --bg:#F5F5F0;--cd:#fff;--br:#E0E0DA;
  --tx:#1A1A1A;--t2:#666;--t3:#999;
  --r:10px;--rl:14px;
}
body.dark{
  --v:#4A8C1C;--vl:#1A2E0A;--vm:#5FA328;
  --am:#2E2008;--amb:#EF9F27;--amt:#F5C87A;
  --rd:#2E0808;--rdb:#8B3030;--rdt:#F09595;
  --bl:#081828;--blb:#2B5280;--blt:#85B7EB;
  --gy:#1A1A18;--gyb:#3A3A38;--gyt:#A0A09A;
  --bg:#0F0F0D;--cd:#1C1C1A;--br:#2E2E2A;
  --tx:#F0F0EC;--t2:#AAA9A4;--t3:#666;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.app{flex:1;display:flex;flex-direction:column}
.hdr{background:var(--v);color:#fff;padding:12px 16px 10px;position:sticky;top:0;z-index:30}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:15px;font-weight:600}
.hdr-sub{font-size:10px;opacity:.75;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.role-tag{font-size:9px;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 8px}
.av-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;cursor:pointer}
.tab-bar{display:flex;background:var(--cd);border-bottom:0.5px solid var(--br);position:sticky;top:58px;z-index:29}
.tab{flex:1;padding:8px 2px 6px;text-align:center;font-size:9px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;border:none;background:none;line-height:1.2}
.tab i{font-size:17px}
.tab.active{color:var(--v);border-bottom:2px solid var(--v)}
.ndot{width:6px;height:6px;background:#E24B4A;border-radius:50%;position:absolute;top:4px;right:5px;display:none}
.ndot.show{display:block}
.content{flex:1;overflow-y:auto;padding:14px 16px 80px}
.screen{display:none}.screen.active{display:block}
.card{background:var(--cd);border:0.5px solid var(--br);border-radius:var(--rl);padding:12px 14px;margin-bottom:10px}
.card-title{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title i{font-size:14px;color:var(--v)}
.sec-lbl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;padding:10px 0 5px}
.form-row{margin-bottom:10px}
.form-lbl{font-size:10.5px;font-weight:600;color:var(--t2);display:block;margin-bottom:3px}
.form-in{width:100%;border:0.5px solid var(--br);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--cd);color:var(--tx);outline:none}
.form-in:focus{border-color:var(--v)}
textarea.form-in{resize:vertical}
.btn-p{background:var(--v);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;width:100%;justify-content:center}
.btn-s{background:none;border:0.5px solid var(--br);border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--tx);display:inline-flex;align-items:center;gap:5px;flex:1;justify-content:center}
.btn-d{background:var(--rd);border:none;border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--rdt);font-weight:600;display:inline-flex;align-items:center;gap:5px;flex:1;justify-content:center}
.btn-sm{font-size:10.5px;padding:4px 9px;border-radius:6px;border:0.5px solid var(--br);background:none;cursor:pointer;color:var(--tx)}
.btn-sm.g{background:var(--vl);border-color:#97C459;color:var(--v)}
.btn-sm.r{background:var(--rd);border-color:var(--rdb);color:var(--rdt)}
.btn-sm.b{background:var(--bl);border-color:var(--blb);color:var(--blt)}
.macts{display:flex;gap:7px;margin-top:12px}
.badge{font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.b-ok{background:var(--vl);color:var(--v)}.b-warn{background:var(--am);color:var(--amt)}
.b-danger{background:var(--rd);color:var(--rdt)}.b-info{background:var(--bl);color:var(--blt)}
.b-gray{background:var(--gy);color:var(--gyt)}.b-teal{background:#E1F5EE;color:#0F6E56}
.ib{border-radius:8px;padding:9px 11px;font-size:11px;line-height:1.5;margin:8px 0}
.ib-green{background:var(--vl);color:var(--v);border-left:3px solid var(--vm)}
.ib-amber{background:var(--am);color:var(--amt);border-left:3px solid var(--amb)}
.ib-blue{background:var(--bl);color:var(--blt);border-left:3px solid var(--blt)}
.ib-red{background:var(--rd);color:var(--rdt);border-left:3px solid var(--rdt)}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav{background:none;border:0.5px solid var(--br);border-radius:7px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx)}
.cal-month{font-size:13px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dn{text-align:center;font-size:9.5px;color:var(--t2);padding:3px 0}
.cal-d{text-align:center;font-size:12px;padding:6px 0;border-radius:7px;cursor:pointer;position:relative}
.cal-d:hover{background:var(--vl)}.cal-d.today{font-weight:600;color:var(--v)}
.cal-d.sel{background:var(--v);color:#fff!important}.cal-d.blk{background:var(--rd);color:var(--rdt);cursor:default}
.cal-d.hasr::after{content:'';width:4px;height:4px;background:var(--amb);border-radius:50%;position:absolute;bottom:1px;left:50%;transform:translateX(-50%)}
.cal-d.sel.hasr::after{background:#fff}
.leg-row{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.slot{border:0.5px solid var(--br);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
.slot.livre{background:var(--vl);border-color:#97C459}.slot.ocupado{background:var(--rd);border-color:var(--rdb);cursor:default}
.slot.meu{background:var(--bl);border-color:var(--blb)}.slot.bloq{background:var(--gy);border-color:var(--gyb);cursor:default}
.slot .sh{font-size:11px;font-weight:600}.slot .sl{font-size:9.5px;margin-top:1px}
.slot.livre .sl{color:var(--v)}.slot.ocupado .sl{color:var(--rdt)}.slot.meu .sl{color:var(--blt)}.slot.bloq .sl{color:var(--gyt)}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.mod-btn{border:0.5px solid var(--br);border-radius:8px;padding:10px 6px;cursor:pointer;text-align:center;background:var(--cd)}
.mod-btn.sel{border:2px solid var(--v);background:var(--vl)}
.mod-btn .mi{font-size:20px;margin-bottom:3px}.mod-btn .mn{font-size:11px;font-weight:600;color:var(--tx)}.mod-btn .mr{font-size:9.5px;color:var(--t2)}
.dur-row{display:flex;gap:6px;margin:8px 0}
.dur-btn{flex:1;border:0.5px solid var(--br);border-radius:8px;padding:10px;text-align:center;cursor:pointer;background:var(--cd)}

.res-card.cancelada{border-left:3px solid var(--rdb);border-radius:0 var(--r) var(--r) 0;opacity:.65}
.res-card.expirada{border-left:3px solid var(--gyb);border-radius:0 var(--r) var(--r) 0;opacity:.65}
.res-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.res-data{font-size:12px;font-weight:600}.res-info{font-size:11px;color:var(--t2);margin-top:2px}
.res-acts{display:flex;gap:5px;margin-top:8px}
.ckin-hero{background:var(--v);border-radius:var(--rl);padding:18px 16px;color:#fff;text-align:center;margin-bottom:10px}

.ckin-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--br)}

.av-card{border:0.5px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.av-card.urgente{border-left:3px solid #E24B4A;border-radius:0 var(--r) var(--r) 0}
.av-card.info{border-left:3px solid var(--blt);border-radius:0 var(--r) var(--r) 0}
.av-card.manutencao{border-left:3px solid var(--amb);border-radius:0 var(--r) var(--r) 0}
.av-card.comunicado{border-left:3px solid var(--v);border-radius:0 var(--r) var(--r) 0}
.av-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 11px 4px}
.av-titulo{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.av-corpo{font-size:11px;color:var(--t2);padding:0 11px 6px;line-height:1.4}
.av-foot{display:flex;align-items:center;justify-content:space-between;padding:5px 11px 9px;font-size:10px;color:var(--t2);flex-wrap:wrap;gap:4px}
.oco-card{border:0.5px solid var(--br);border-radius:var(--r);padding:10px 11px;margin-bottom:7px;cursor:pointer}
.oco-card.aberta{border-left:3px solid var(--blt);border-radius:0 var(--r) var(--r) 0}
.oco-card.andamento{border-left:3px solid var(--amb);border-radius:0 var(--r) var(--r) 0}
.oco-card.resolvida{border-left:3px solid var(--v);border-radius:0 var(--r) var(--r) 0}
.oco-card.encerrada{border-left:3px solid var(--gyb);border-radius:0 var(--r) var(--r) 0;opacity:.7}
.oco-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.oco-titulo{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.oco-meta{font-size:10px;color:var(--t2);display:flex;gap:6px;flex-wrap:wrap}
.oco-cat{font-size:9.5px;padding:1px 6px;border-radius:20px;background:var(--bg);color:var(--t2)}
.resumo-box{background:var(--bg);border-radius:8px;padding:10px 12px;margin:10px 0}
.resumo-row{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;border-bottom:0.5px solid var(--br)}
.resumo-row:last-child{border-bottom:none;font-weight:600}.resumo-lbl{color:var(--t2)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-card{background:var(--cd);border-radius:16px 16px 0 0;padding:16px 16px 28px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.modal-card.center{border-radius:14px;margin:20px;max-height:85vh}
.mhandle{width:28px;height:3px;background:var(--br);border-radius:2px;margin:0 auto 12px}
.mtitle{font-size:14px;font-weight:600;margin-bottom:3px}.msub{font-size:11px;color:var(--t2);margin-bottom:11px}

.m-info-row i{font-size:14px;color:var(--v)}
.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px}
.filter-bar::-webkit-scrollbar{display:none}
.fpill{font-size:10px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--br);background:none;cursor:pointer;white-space:nowrap;color:var(--t2)}
.fpill.active{background:var(--v);color:#fff;border-color:var(--v)}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--v)}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:32px;text-align:center}
.login-card{background:#fff;border-radius:var(--rl);padding:24px;width:100%;max-width:360px}
.login-lbl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block}
.login-input{width:100%;border:0.5px solid var(--br);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:14px;outline:none}
.login-input:focus{border-color:var(--v)}

.tgl.on{background:var(--v)}
.tgl::after{content:'';width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}
.tgl.on::after{left:18px}
.empty{text-align:center;padding:32px 16px;color:var(--t2)}

#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(23,52,4,.94);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:500;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .3s;max-width:90vw;text-align:center}

// UTILITÁRIOS
function ts() { return new Date().toISOString().slice(0,10); }
function fmtD(ds) { if(!ds) return ''; var p=ds.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function addH(t,h) { var p=t.split(':').map(Number); return String(p[0]+h).padStart(2,'0')+':'+String(p[1]).padStart(2,'0'); }

var toastT;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(toastT); toastT = setTimeout(function(){ el.style.opacity='0'; }, 2800);
}
function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
function isAdmin() { return !!(morador && morador.tipo === 'admin' && morador.status === 'ativo'); }
function requireAdmin() {
  if(!isAdmin()) { toast('Acesso restrito aos administradores.'); goScreen('avisos'); return false; }
  return true;
}

function resetPermissoesUI() {
  ['tab-config'].forEach(function(id) {
    var e = document.getElementById(id);
    if(e) e.style.display = 'none';
  });
  var bno = document.getElementById('btn-nova-oco');
  if(bno) bno.style.display = 'none';
  var fab = document.getElementById('fab-aviso');
  if(fab) fab.innerHTML = '';
  var nd = document.getElementById('nd-config');
  if(nd) nd.classList.remove('show');
}

function bloquearSessao(msg) {
  sb.auth.signOut().finally(function() {
    usuario = null; morador = null;
    resetPermissoesUI();
    document.getElementById('app-main').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    var err = document.getElementById('login-err');
    if(err) { err.textContent = msg; err.style.display = 'block'; }
  });
}

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-send" aria-hidden="true"></i>Enviar link';
    if(res.error) {
      errEl.textContent = 'Erro: ' + res.error.message;
      errEl.style.display = 'block';
    } else {
      okEl.style.display = 'block';
      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-clock" aria-hidden="true"></i>Aguarde 60s';
      var t = 60;
      var iv = setInterval(function() {
        t--;
        if(t <= 0) {
          clearInterval(iv);
          btn.disabled = false;
          btn.innerHTML = '<i class="ti ti-send" aria-hidden="true"></i>Enviar novamente';
        } else {
          btn.innerHTML = '<i class="ti ti-clock" aria-hidden="true"></i>Aguarde ' + t + 's';

// INICIAR APP - IGUAL AO SEU (mantido)
function iniciarApp(user) {
  usuario = user;
  resetPermissoesUI();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-main').style.display = 'flex';

  sb.from('moradores').select('*,unidades(*)').eq('auth_user_id', user.id).maybeSingle().then(function(res) {
    if(res.error || !res.data) { bloquearSessao('Cadastro nao encontrado. Fale com a administracao.'); return; }
    morador = res.data;
    if(morador.status === 'pendente') { bloquearSessao('Seu cadastro esta aguardando aprovacao do administrador.'); return; }
    if(morador.status === 'inativo') { bloquearSessao('Seu cadastro esta inativo. Fale com a administracao.'); return; }
    if(morador.status !== 'ativo' && morador.status !== 'suspenso') { bloquearSessao('Cadastro sem permissao de acesso.'); return; }

    var n = morador.nome || '';
    var partes = n.split(' ');
    var ini = ((partes[0]||'')[0]||'') + ((partes[partes.length-1]||'')[0]||'');
    ini = ini.toUpperCase();
    document.getElementById('av-btn').textContent = ini;
    document.getElementById('pf-av').textContent = ini;
    document.getElementById('pf-nome').textContent = morador.nome;

    var tipoTxt = {proprietario:'Proprietario',inquilino:'Inquilino',admin:'Administrador'}[morador.tipo] || morador.tipo;
    var cod = morador.unidades ? morador.unidades.codigo : '';
    var aptoLabel = cod ? ('Apto '+cod+' - '+tipoTxt) : 'Administrador / Sindico';
    document.getElementById('pf-apto').textContent = aptoLabel;
    document.getElementById('hdr-sub').textContent = cod ? ('Apto '+cod+' - Quadra Poliesportiva') : 'Administrador / Sindico';

    if(!isAdmin() && morador.tipo !== 'admin') {
      var faltas = morador.faltas_mes || 0;
      var limite = appCfg.faltas_suspensao || 2;
      var wrapFaltas = document.getElementById('pf-faltas-wrap');
      if(wrapFaltas && faltas > 0) {
        wrapFaltas.style.display = 'block';
        document.getElementById('pf-faltas-txt').textContent = faltas + ' / ' + limite;
        var pct = Math.min(Math.round(faltas / limite * 100), 100);
        document.getElementById('pf-faltas-bar').style.width = pct + '%';
        var faltando = limite - faltas;
        var msg = faltando > 0
          ? 'Mais ' + faltando + ' falta(s) resultara em suspensao de ' + (appCfg.suspensao_dias||15) + ' dias.'
          : 'Limite atingido. Novas reservas estao bloqueadas.';
        document.getElementById('pf-faltas-msg').textContent = msg;
      }
    }

    var roleTagEl = document.getElementById('role-tag');
    if(roleTagEl) {
      if(morador.tipo === 'admin') {
        roleTagEl.textContent = 'Administrador';
        roleTagEl.style.background = 'rgba(255,255,255,.35)';
        roleTagEl.style.fontWeight = '600';
      } else if(morador.status === 'suspenso') {
        roleTagEl.textContent = 'Suspenso';
        roleTagEl.style.background = 'rgba(226,75,74,.5)';
      } else {
        roleTagEl.textContent = morador.tipo === 'inquilino' ? 'Inquilino' : 'Morador';
      }
    }
    if(morador.status === 'suspenso' && morador.tipo !== 'admin') {
      toast('Apartamento suspenso. Reservas bloqueadas.');
      return;
    }

    if(morador.foto_url) {
      var fotoImg = document.getElementById('pf-foto');
      var fotoWrap = document.getElementById('pf-foto-wrap');
      var pfAv = document.getElementById('pf-av');
      if(fotoImg) fotoImg.src = morador.foto_url;
      if(fotoWrap) fotoWrap.style.display = 'block';
      if(pfAv) pfAv.style.display = 'none';
    }

    if(isAdmin()) {
      var fab = document.getElementById('fab-aviso');
      fab.innerHTML = '<button class="btn-p" id="btn-novo-aviso" style="margin-bottom:10px"><i class="ti ti-plus" aria-hidden="true"></i>Novo aviso</button>';
      document.getElementById('btn-novo-aviso').addEventListener('click', function() {
        if(!requireAdmin()) return;
        abrirModal('m-novo-aviso');
      });
      document.getElementById('tab-config').style.display = 'flex';
      document.getElementById('btn-nova-oco').style.display = 'flex';
      sb.from('moradores').select('id',{count:'exact',head:true}).eq('status','pendente').then(function(r) {
        var nd = document.getElementById('nd-config');
        if(nd && r.count > 0) { nd.classList.add('show'); toast('Atencao: '+r.count+' inscricao(oes) pendente(s)!'); }
      });
    }
    document.getElementById('tab-ocorrencias').style.display = 'flex';

    if(isAdmin()) {
      var secDisp = document.getElementById('sec-dispensas-wrap');
      if(secDisp) secDisp.style.display = 'block';
    }

    carregarBloqueios();
    carregarConfiguracoes();
    carregarEspacos();
    renderCal();
    renderAvisos();
    renderCheckin();

    if(!morador.onboarding_visto && morador.tipo !== 'admin') {
      setTimeout(function() { abrirModal('m-onboarding'); }, 900);
    }
  });
}

// 3. CORREÇÃO: FUNÇÃO DO CHECKIN (adicionada validação)
function doCheckin(id) {
  sb.from('reservas').select('unidade_id, data_reserva, slot_inicio, checkin_feito, status')
    .eq('id', id)
    .single()
    .then(function(res) {
      if(res.error) { toast('Reserva nao encontrada.'); return; }
      var reserva = res.data;
      
      if(reserva.unidade_id !== morador.unidade_id) {
        toast('Esta reserva nao pertence ao seu apartamento.');
        return;
      }
      
      if(reserva.checkin_feito) {
        toast('Check-in ja realizado para esta reserva.');
        return;
      }
      
      if(reserva.status !== 'confirmada') {
        toast('Esta reserva nao esta mais ativa.');
        return;
      }
      
      var agora = new Date();
      var dataHoraReserva = new Date(reserva.data_reserva + 'T' + (reserva.slot_inicio || '00:00'));
      var diffMin = (agora - dataHoraReserva) / 60000;
      var janelaCheckin = appCfg.checkin_janela_min || 15;
      var antecipacaoPermitida = appCfg.checkin_ant_min || 10;
      
      if(diffMin > janelaCheckin) {
        toast('Janela de check-in expirou. Reserva sera cancelada.');
        sb.from('reservas').update({status: 'expirada'}).eq('id', id).then(function() {
          verificarFairPlay(morador.unidade_id);
          renderCheckin(); 
          renderMinhas();
        });
        return;
      }
      
      if(diffMin < -antecipacaoPermitida) {
        toast('Check-in permitido apenas ' + antecipacaoPermitida + ' minutos antes do inicio.');
        return;
      }
      
      sb.from('reservas').update({
        checkin_feito: true,
        checkin_em: new Date().toISOString()
      }).eq('id', id).then(function(r) {
        if(r.error) { toast('Erro no check-in: ' + r.error.message); return; }
        renderCheckin(); 
        renderMinhas();
        toast('Check-in realizado! Boa partida!');
      });
    });
}

// 4. CORREÇÃO: RESERVA DE ACADEMIA (adicionar espaco_id)
function selDataAcademia(ds) {
  if(ds < ts()) { toast('Nao e possivel reservar datas passadas.'); return; }
  if(!morador || !morador.unidade_id) { toast('Sem apartamento vinculado.'); return; }
  if(morador.status === 'suspenso' && morador.tipo !== 'admin') { toast('Apartamento suspenso.'); return; }
  acSelDate = ds;
  renderAcademia();
  var sc = document.getElementById('ac-slots-card');
  sc.style.display = 'block';
  document.getElementById('ac-slots-lbl').textContent = 'Horarios - ' + fmtD(ds);
  var sg = document.getElementById('ac-slot-grid');
  var ac = espacos.find(function(e){ return e.id === espacoAcademiaId; });
  var maxSimult = ac ? (ac.max_simult || 3) : 3;

  sb.from('reservas')
    .select('slot_inicio, slot_fim, unidade_id, status')
    .eq('data_reserva', ds)
    .eq('status', 'confirmada')
    .eq('espaco_id', espacoAcademiaId)
    .then(function(res) {
      var reservasDia = res.data || [];
      var agora = new Date();
      var agoraMin = agora.getHours() * 60 + agora.getMinutes();
      var ehHoje = ds === ts();
      var html = '';
      
      SLOTS.forEach(function(slot) {
        if(parseInt(slot) >= 22) return;
        var slotMin = parseInt(slot.split(':')[0]) * 60;
        if(ehHoje && slotMin <= agoraMin) return;
        
        var ocupados = reservasDia.filter(function(r) {
          var ini = parseInt((r.slot_inicio||'00:00').slice(0,2))*60;
          var fim = parseInt((r.slot_fim||'00:00').slice(0,2))*60;
          return slotMin >= ini && slotMin < fim;
        }).length;
        
        var minhaRes = reservasDia.find(function(r) {
          return r.unidade_id === morador.unidade_id && 
                 parseInt((r.slot_inicio||'00:00').slice(0,2))*60 === slotMin;
        });
        
        var livre = ocupados < maxSimult;
        var cls = minhaRes ? 'slot minha' : livre ? 'slot livre' : 'slot ocupado';
        var lbl = minhaRes ? 'Minha' : livre ? (ocupados + '/' + maxSimult) : 'Cheio';
        var action = minhaRes ? '' : livre ? 'ac_' + slot : '';
        
        html += '<div class="' + cls + '" data-ac-slot="' + (action||'') + '">'
          + '<div class="sh">' + slot + '</div>'
          + '<div class="sl">' + lbl + '</div></div>';
      });
      
      sg.innerHTML = html || '<div class="empty">Sem horarios disponiveis</div>';
      
      sg.querySelectorAll('[data-ac-slot]').forEach(function(el) {
        var act = el.dataset.acSlot;
        if(!act) return;
        el.addEventListener('click', function() {
          var slot = act.replace('ac_', '');
          if(!confirm('Reservar academia em ' + fmtD(ds) + ' as ' + slot + '?')) return;
          var horaIni = slot + ':00';
          var horaFim = addH(slot, 1) + ':00';
          
          // CORREÇÃO: adicionado espaco_id
          sb.from('reservas').insert({
            unidade_id: morador.unidade_id,
            morador_id: morador.id,
            data_reserva: ds,
            slot_inicio: horaIni,
            slot_fim: horaFim,
            duracao_min: 60,
            tipo_reserva: 'pontual',
            status: 'confirmada',
            espaco_id: espacoAcademiaId
          }).then(function(r) {
            if(r.error) { toast('Erro: ' + r.error.message); return; }
            toast('Academia reservada!');
            selDataAcademia(ds);
            renderAcademia();
          });
        });
      });
    });
}

function abrirModalCancelar(id) {
  cancelId = id;
  dispensaReservaId = null;
  var chkIsentar = document.getElementById('chk-isentar');
  if(chkIsentar) chkIsentar.checked = false;
  var wrapIsentar = document.getElementById('admin-isentar-wrap');
  if(wrapIsentar) wrapIsentar.style.display = isAdmin() ? 'block' : 'none';
  var mcMotivo = document.getElementById('mc-motivo');
  if(mcMotivo) mcMotivo.value = '';
  
  sb.from('reservas').select('*').eq('id',id).single().then(function(res) {
    var r = res.data; if(!r) return;
    document.getElementById('mc-sub').textContent = 'Apto '+(morador&&morador.unidades?morador.unidades.codigo:'');
    document.getElementById('mc-dt').textContent = fmtD(r.data_reserva);
    document.getElementById('mc-hr').textContent = (r.slot_inicio||'').slice(0,5)+' - '+(r.slot_fim||'').slice(0,5);
    
    var avisoPen = document.getElementById('mc-aviso-penalidade');
    var foraCarencia = false;
    var podeSolicitarDispensa = false;
    
    if(!isAdmin() && r.slot_inicio) {
      var agora = new Date();
      var dtStr = r.data_reserva + 'T' + r.slot_inicio;
      var dtReserva = new Date(dtStr);
      var diffMin = (dtReserva - agora) / 60000;
      var carenciaMin = appCfg.carencia_cancel_min || 120;
      foraCarencia = diffMin < carenciaMin;
      podeSolicitarDispensa = foraCarencia && diffMin > 0;
    }
    
    if(avisoPen) {
      avisoPen.style.display = foraCarencia ? 'block' : 'none';
      if(podeSolicitarDispensa) {
        avisoPen.innerHTML = '<i class="ti ti-alert-triangle" aria-hidden="true"></i> ' +
          'Este cancelamento esta fora do prazo de carencia. ' +
          'Voce pode solicitar dispensa da falta ao administrador.';
      }
    }
    
    dispensaReservaId = podeSolicitarDispensa ? id : null;
    abrirModal('m-cancelar');
  });
}

// 6. CORREÇÃO: CONFIRMAR RESERVA (conflito de horários)
function _fazerInsertReserva() {
  var horaInicio = pendSlot.slot + ':00';
  var horaFim = addH(pendSlot.slot, pendDur / 60) + ':00';
  var _date = pendSlot.date;
  var _mod = pendMod;

  sb.from('reservas')
    .select('id, slot_inicio, slot_fim')
    .eq('data_reserva', pendSlot.date)
    .neq('status', 'cancelada')
    .eq('espaco_id', espacoQuadraId)
    .then(function(conflito) {
      var reservasExistentes = conflito.data || [];
      
      var temConflito = reservasExistentes.some(function(reserva) {
        var iniExistente = reserva.slot_inicio || '00:00:00';
        var fimExistente = reserva.slot_fim || '00:00:00';
        var conflita = (horaInicio < fimExistente && horaFim > iniExistente);
        if(conflita) {
          toast('Conflito com reserva existente: ' + iniExistente.slice(0,5) + '-' + fimExistente.slice(0,5));
        }
        return conflita;
      });
      
      if(temConflito) {
        toast('Horario indisponivel. Por favor, escolha outro.');
        selData(_date);
        fecharModal('m-reserva');
        return;
      }

      var modNome = MODS.find(function(x){ return x.id === pendMod; }).nome;
      sb.from('modalidades').select('id,nome').then(function(r) {
        var todas = r.data||[];
        var semAcento = function(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); };
        var found = todas.find(function(m){ return semAcento(m.nome)===semAcento(modNome); });
        var mid = found ? found.id : null;

        sb.from('reservas').insert({
          unidade_id: morador.unidade_id, 
          morador_id: morador.id, 
          modalidade_id: mid,
          data_reserva: pendSlot.date,
          slot_inicio: horaInicio, 
          slot_fim: horaFim,
          duracao_min: pendDur, 
          tipo_reserva: 'pontual', 
          status: 'confirmada',
          espaco_id: espacoQuadraId
        }).then(function(r2) {
          if(r2.error) { 
            toast('Erro: '+r2.error.message); 
            return; 
          }
          fecharModal('m-reserva');
          var modNomeCalendar = MODS.find(function(x){ return x.id===_mod; });
          var nomeModal = modNomeCalendar ? modNomeCalendar.nome : '';
          var apto = morador.unidades ? morador.unidades.codigo : '';
          var linkCalendar = gerarLinkGoogleCalendar(
            _date,
            horaInicio.slice(0,5),
            horaFim.slice(0,5),
            nomeModal,
            apto
          );
          var det = document.getElementById('m-reserva-ok-detalhe');
          if(det) det.textContent = (apto ? 'Apto '+apto+' • ' : '') + fmtD(_date) + ' • ' + horaInicio.slice(0,5) + '–' + horaFim.slice(0,5) + (nomeModal ? ' • '+nomeModal : '');
          var btnCal = document.getElementById('btn-calendar-link');
          if(btnCal) btnCal.href = linkCalendar;
          abrirModal('m-reserva-ok');
          setTimeout(function(){ selData(_date); renderMinhas(); renderCheckin(); }, 300);
        });
      });
    });
}
